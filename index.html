<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Dashboard — Leonardo Ferrari</title>
  <style>
    :root {
      --bg: #f4f4f7;
      --surface: #ffffff;
      --surface2: #eeeef3;
      --border: #e0e0ea;
      --border-hover: #c4c4d4;
      --text: #18182a;
      --text-muted: #62627a;
      --text-faint: #aaaabf;
      --accent: #5b4de8;
      --accent-soft: rgba(91,77,232,0.09);
      --accent-hover: rgba(91,77,232,0.16);
      --green: #15803d;   --green-soft: rgba(21,128,61,0.09);
      --blue: #1d4ed8;    --blue-soft: rgba(29,78,216,0.09);
      --orange: #c2410c;  --orange-soft: rgba(194,65,12,0.09);
      --pink: #be185d;    --pink-soft: rgba(190,24,93,0.09);
      --yellow: #a16207;  --yellow-soft: rgba(161,98,7,0.09);
      --r: 10px; --rs: 7px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(244,244,247,0.95);
      backdrop-filter: blur(12px);
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent-soft);
      border: 1px solid var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .logo-text h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .logo-text p  { font-size: 11px; color: var(--text-muted); }
    .header-stats { display: flex; gap: 20px; }
    .stat { text-align: right; }
    .stat-num { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; }
    .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── TOOLBAR ── */
    .toolbar {
      flex-shrink: 0;
      padding: 12px 28px;
      display: flex; gap: 10px; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .search-wrap { flex: 1; position: relative; max-width: 340px; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
    #search {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--rs); padding: 8px 12px 8px 36px;
      color: var(--text); font-size: 13px; outline: none;
      transition: border-color 0.18s;
    }
    #search::placeholder { color: var(--text-faint); }
    #search:focus { border-color: var(--accent); }

    .filters { display: flex; gap: 5px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); font-size: 12px;
      cursor: pointer; transition: all 0.16s; white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .filter-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

    .view-toggle { display: flex; border: 1px solid var(--border); border-radius: var(--rs); overflow: hidden; margin-left: auto; }
    .view-btn {
      padding: 7px 12px; background: transparent; border: none;
      color: var(--text-muted); cursor: pointer; transition: all 0.16s; display: flex; align-items: center;
    }
    .view-btn.active { background: var(--accent-soft); color: var(--accent); }

    /* ── MAIN ── */
    .main { flex: 1; min-height: 0; display: flex; overflow: hidden; }

    /* ── CARDS LIST ── */
    .cards-area { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 0; }
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      color: var(--text-faint); text-transform: uppercase;
      padding: 16px 8px 6px; flex-shrink: 0;
    }
    .section-label:first-child { padding-top: 0; }

    /* HORIZONTAL CARD */
    .card {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 14px; border-radius: var(--rs);
      border: 1px solid transparent;
      cursor: pointer; transition: all 0.16s;
      position: relative;
    }
    .card:hover { background: var(--surface); border-color: var(--border); }
    .card.active { background: var(--surface); border-color: var(--accent); }

    .card-icon {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .cat-pd    .card-icon { background: var(--green-soft);  color: var(--green);  }
    .cat-figma .card-icon { background: var(--blue-soft);   color: var(--blue);   }
    .cat-dev   .card-icon { background: var(--pink-soft);   color: var(--pink);   }
    .cat-sistema .card-icon { background: var(--orange-soft); color: var(--orange); }
    .cat-memoria .card-icon { background: var(--yellow-soft); color: var(--yellow); }

    .card-left { display: flex; flex-direction: column; min-width: 160px; flex-shrink: 0; }
    .card-name { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
    .card-command { font-size: 11px; font-family: 'SF Mono','Fira Code',monospace; color: var(--text-muted); margin-top: 1px; }

    .card-desc {
      flex: 1; font-size: 12px; color: var(--text-muted); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .badge {
      padding: 2px 7px; border-radius: 20px; font-size: 10px;
      font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .badge-orq  { background: var(--accent-soft);  color: var(--accent);  border: 1px solid rgba(124,106,247,0.3); }
    .badge-esp  { background: var(--blue-soft);    color: var(--blue);    border: 1px solid rgba(96,165,250,0.3); }
    .badge-util { background: var(--orange-soft);  color: var(--orange);  border: 1px solid rgba(251,146,60,0.3); }
    .badge-mem  { background: var(--yellow-soft);  color: var(--yellow);  border: 1px solid rgba(250,204,21,0.3); }

    .rel-count {
      font-size: 10px; padding: 2px 7px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 20px; color: var(--text-muted);
    }
    .copy-btn {
      background: none; border: none; color: var(--text-faint); cursor: pointer;
      padding: 4px; border-radius: 4px; transition: color 0.14s; display: flex; align-items: center;
    }
    .copy-btn:hover { color: var(--text); }
    .copy-btn.copied { color: var(--green); }

    /* NO RESULTS */
    .no-results {
      display: none; flex-direction: column; align-items: center;
      padding: 60px 40px; gap: 12px; color: var(--text-faint);
    }
    .no-results.visible { display: flex; }
    .no-results p { font-size: 13px; text-align: center; line-height: 1.6; }

    /* ── GRAPH ── */
    .graph-area { flex: 1; display: none; position: relative; overflow: hidden; }
    .graph-area.active { display: block; }
    #graph-canvas { display: block; width: 100%; height: 100%; }

    /* ── RESIZE HANDLE ── */
    .resize-handle {
      width: 8px; flex-shrink: 0; cursor: col-resize;
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background: transparent; transition: background 0.16s;
    }
    .resize-handle::after {
      content: '';
      display: block; width: 1px; height: 100%;
      background: var(--border); transition: background 0.16s, width 0.12s;
    }
    .resize-handle:hover::after,
    .resize-handle.dragging::after {
      width: 2px; background: var(--accent);
    }

    /* ── DETAIL PANEL ── */
    .detail-panel {
      width: 360px; min-width: 220px; max-width: 60vw;
      flex-shrink: 0; background: var(--surface);
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .detail-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 12px; color: var(--text-faint); padding: 40px; text-align: center;
    }
    .detail-empty svg { opacity: 0.25; }
    .detail-empty p { font-size: 12px; line-height: 1.6; }

    .detail-content { padding: 24px; display: flex; flex-direction: column; gap: 18px; }
    .detail-top { display: flex; gap: 12px; align-items: flex-start; }
    .detail-icon {
      width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .cat-pd    .detail-icon { background: var(--green-soft);  color: var(--green);  }
    .cat-figma .detail-icon { background: var(--blue-soft);   color: var(--blue);   }
    .cat-dev   .detail-icon { background: var(--pink-soft);   color: var(--pink);   }
    .cat-sistema .detail-icon { background: var(--orange-soft); color: var(--orange); }
    .cat-memoria .detail-icon { background: var(--yellow-soft); color: var(--yellow); }

    .detail-title { flex: 1; }
    .detail-title h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 5px; }
    .detail-cmd-row { display: flex; align-items: center; gap: 6px; }
    .detail-cmd {
      font-family: 'SF Mono','Fira Code',monospace; font-size: 12px;
      color: var(--accent); background: var(--accent-soft); padding: 3px 9px;
      border-radius: 5px; cursor: pointer; transition: background 0.14s;
    }
    .detail-cmd:hover { background: var(--accent-hover); }

    .ds { }
    .ds h3 {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      color: var(--text-faint); text-transform: uppercase; margin-bottom: 7px;
    }
    .ds p { font-size: 12px; color: var(--text-muted); line-height: 1.65; }

    .outcome-box {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--rs); padding: 12px;
    }
    .outcome-box p { font-size: 12px; color: var(--text); line-height: 1.6; }

    .triggers-list { display: flex; flex-wrap: wrap; gap: 5px; }
    .trigger-tag {
      font-size: 11px; padding: 3px 9px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 20px; color: var(--text-muted);
    }

    .relations-list { display: flex; flex-direction: column; gap: 5px; }
    .rel-item {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 11px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--rs); cursor: pointer; transition: border-color 0.14s;
    }
    .rel-item:hover { border-color: var(--border-hover); }
    .rel-icon { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .rel-text { flex: 1; }
    .rel-name { font-size: 12px; font-weight: 500; }
    .rel-desc { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
    .rel-arrow { color: var(--text-faint); }

    .fulltext-box {
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--rs);
      padding: 14px; font-size: 11px; color: var(--text-muted); line-height: 1.7;
      max-height: 200px; overflow-y: auto;
      font-family: 'SF Mono','Fira Code',monospace;
      white-space: pre-wrap; word-break: break-word;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--rs); padding: 9px 14px; font-size: 12px;
      color: var(--green); z-index: 999; opacity: 0;
      transform: translateY(6px); transition: all 0.18s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── COMMAND PALETTE ── */
    .palette-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(24,24,42,0.35);
      backdrop-filter: blur(5px);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 14vh;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s;
    }
    .palette-overlay.open { opacity: 1; pointer-events: all; }

    .palette {
      width: 560px; max-width: calc(100vw - 40px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.14), 0 4px 16px rgba(0,0,0,0.07);
      overflow: hidden;
      transform: translateY(-8px) scale(0.98);
      transition: transform 0.15s;
    }
    .palette-overlay.open .palette { transform: translateY(0) scale(1); }

    .palette-input-row {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .palette-input-row svg { color: var(--text-muted); flex-shrink: 0; }
    #palette-input {
      flex: 1; background: none; border: none; outline: none;
      font-size: 15px; color: var(--text);
    }
    #palette-input::placeholder { color: var(--text-faint); }
    .palette-kbd {
      font-size: 10px; padding: 2px 6px; border-radius: 4px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-faint); font-family: 'SF Mono','Fira Code',monospace;
      flex-shrink: 0;
    }

    .palette-results {
      max-height: 360px; overflow-y: auto;
    }
    .palette-empty {
      padding: 28px 20px; text-align: center;
      font-size: 13px; color: var(--text-faint);
    }
    .palette-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; cursor: pointer;
      transition: background 0.1s;
    }
    .palette-item:hover,
    .palette-item.selected { background: var(--accent-soft); }
    .palette-item-icon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .palette-item-body { flex: 1; min-width: 0; }
    .palette-item-name {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .palette-item-name mark {
      background: none; color: var(--accent); font-weight: 700;
    }
    .palette-item-desc {
      font-size: 11px; color: var(--text-muted); margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .palette-item-cmd {
      font-size: 11px; font-family: 'SF Mono','Fira Code',monospace;
      color: var(--accent); background: var(--accent-soft);
      padding: 2px 7px; border-radius: 4px; flex-shrink: 0;
    }

    .palette-footer {
      padding: 9px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 16px;
    }
    .palette-hint {
      font-size: 11px; color: var(--text-faint);
      display: flex; align-items: center; gap: 5px;
    }
    .palette-hint kbd {
      font-size: 10px; padding: 1px 5px; border-radius: 3px;
      background: var(--surface2); border: 1px solid var(--border);
      font-family: inherit; color: var(--text-muted);
    }
  </style>
</head>
<body>

<div class="toast" id="toast">Copiado!</div>

<!-- COMMAND PALETTE -->
<div class="palette-overlay" id="palette-overlay">
  <div class="palette" id="palette">
    <div class="palette-input-row">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="palette-input" placeholder="Buscar skill ou descrever o que precisa…" autocomplete="off" spellcheck="false" />
      <span class="palette-kbd">Esc</span>
    </div>
    <div class="palette-results" id="palette-results"></div>
    <div class="palette-footer">
      <span class="palette-hint"><kbd>↑↓</kbd> navegar</span>
      <span class="palette-hint"><kbd>Enter</kbd> copiar comando</span>
      <span class="palette-hint"><kbd>⌘K</kbd> fechar</span>
    </div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
    <div class="logo-text">
      <h1>Skills Dashboard</h1>
      <p>Leonardo Ferrari · Claude Code</p>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Skills</div>
    </div>
    <div class="stat">
      <div class="stat-num">5</div>
      <div class="stat-label">Categorias</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-visible">0</div>
      <div class="stat-label">Visíveis</div>
    </div>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar skills, triggers…" autocomplete="off" />
  </div>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Todas</button>
    <button class="filter-btn" data-filter="pd">Product Design</button>
    <button class="filter-btn" data-filter="figma">Figma</button>
    <button class="filter-btn" data-filter="dev">Interface</button>
    <button class="filter-btn" data-filter="sistema">Sistema</button>
    <button class="filter-btn" data-filter="memoria">Memória</button>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" data-view="list" title="Lista">
      <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="2" rx="1"/><rect x="3" y="11" width="18" height="2" rx="1"/><rect x="3" y="17" width="18" height="2" rx="1"/></svg>
    </button>
    <button class="view-btn" data-view="graph" title="Grafo de relações">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="19" cy="19" r="2"/><path d="M7 12h5M14 6.5l-5 4M14 17.5l-5-4"/></svg>
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CARDS LIST -->
  <div class="cards-area" id="cards-area">
    <div class="no-results" id="no-results">
      <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>Nenhuma skill encontrada.</p>
    </div>
  </div>

  <!-- GRAPH -->
  <div class="graph-area" id="graph-area">
    <canvas id="graph-canvas"></canvas>
  </div>

  <!-- RESIZE HANDLE -->
  <div class="resize-handle" id="resize-handle"></div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-empty" id="detail-empty">
      <svg width="44" height="44" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
      <p>Selecione uma skill<br>para ver os detalhes</p>
    </div>
    <div class="detail-content" id="detail-content" style="display:none;"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// DATA — conteúdo real dos arquivos .md
// ─────────────────────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────────────────
// ICONS — Lucide outline SVG paths (stroke-based, no fill)
// ─────────────────────────────────────────────────────────────────────────────
const ICON_PATHS = {
  compass:      `<circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>`,
  search:       `<circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>`,
  presentation: `<path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5-5 5 5"/>`,
  users:        `<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>`,

let activeFilter = 'all';
let activeSkill  = null;
let currentView  = 'list';
let searchQuery  = '';
let graphInstance = null;

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const CAT_COLORS = { pd: '#15803d', figma: '#1d4ed8', dev: '#be185d', sistema: '#c2410c', memoria: '#a16207' };

function typeLabel(t) {
  return { orquestrador:'Orquestrador', especialista:'Especialista', util:'Utilitário', memoria:'Memória' }[t] || t;
}
function badgeClass(t) {
  return { orquestrador:'badge-orq', especialista:'badge-esp', util:'badge-util', memoria:'badge-mem' }[t] || 'badge-util';
}

function filteredSkills() {
  const q = searchQuery.toLowerCase();
  return SKILLS.filter(s => {
    const matchCat = activeFilter === 'all' || s.category === activeFilter;
    const matchQ   = !q || s.name.toLowerCase().includes(q) || s.command.toLowerCase().includes(q)
      || s.description.toLowerCase().includes(q) || s.triggers.some(t => t.toLowerCase().includes(q));
    return matchCat && matchQ;
  });
}

function groupedSkills(skills) {
  const labels = { pd:'Product Design', figma:'Figma', dev:'Interface & Frontend', sistema:'Sistema', memoria:'Memória' };
  const g = {};
  skills.forEach(s => { (g[s.category] = g[s.category] || []).push(s); });
  return Object.entries(g).map(([cat, items]) => ({ label: labels[cat] || cat, items }));
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER CARDS (horizontal list)
// ─────────────────────────────────────────────────────────────────────────────
function renderCards() {
  const area = document.getElementById('cards-area');
  const noR  = document.getElementById('no-results');
  const skills = filteredSkills();

  document.getElementById('stat-total').textContent   = SKILLS.length;
  document.getElementById('stat-visible').textContent = skills.length;

  Array.from(area.children).forEach(c => { if (c.id !== 'no-results') c.remove(); });

  if (!skills.length) { noR.classList.add('visible'); return; }
  noR.classList.remove('visible');

  groupedSkills(skills).forEach(({ label, items }) => {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = label;
    area.appendChild(lbl);

    items.forEach(skill => {
      const card = document.createElement('div');
      card.className = `card cat-${skill.category}${activeSkill?.id === skill.id ? ' active' : ''}`;
      card.dataset.id = skill.id;

      const relLabel = skill.relations.length
        ? `<span class="rel-count">${skill.relations.length} relação${skill.relations.length > 1 ? 'ões' : ''}</span>`
        : '';

      card.innerHTML = `
        <div class="card-icon">${getIcon(skill.icon, 18)}</div>
        <div class="card-left">
          <div class="card-name">${skill.name}</div>
          <div class="card-command">${skill.command}</div>
        </div>
        <div class="card-desc">${skill.description}</div>
        <div class="card-right">
          <span class="badge ${badgeClass(skill.type)}">${typeLabel(skill.type)}</span>
          ${relLabel}
          <button class="copy-btn" title="Copiar comando">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
      `;

      card.addEventListener('click', e => {
        if (e.target.closest('.copy-btn')) return;
        selectSkill(skill);
      });
      card.querySelector('.copy-btn').addEventListener('click', e => {
        e.stopPropagation();
        copyText(skill.command, e.currentTarget);
      });

      area.appendChild(card);
    });
  });
}

  activeSkill = skill;

  // Update active card
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('active', c.dataset.id === skill.id));

  // Update graph selection
  if (graphInstance) graphInstance.selectBySkillId(skill.id);

  document.getElementById('detail-empty').style.display   = 'none';

  const relHTML = skill.relations.map(r => {

    return `<div class="rel-item" data-id="${s.id}">
      <div class="rel-icon" style="background:${c}18; color:${c}">${getIcon(s.icon, 13)}</div>
      <div class="rel-text">
        <div class="rel-name">${s.name}</div>

      </div>
      <div class="rel-arrow"><svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></div>
    </div>`;
  }).join('');

  const triggersHTML = skill.triggers.map(t => `<span class="trigger-tag">${t}</span>`).join('');

  content.innerHTML = `
    <div class="detail-top cat-${skill.category}">
      <div class="detail-icon">${getIcon(skill.icon, 22)}</div>
      <div class="detail-title">
        <h2>${skill.name}</h2>
        <div class="detail-cmd-row">
          <span class="detail-cmd" title="Clique para copiar" data-cmd="${skill.command}">${skill.command}</span>
          <span class="badge ${badgeClass(skill.type)}">${typeLabel(skill.type)}</span>
        </div>
      </div>
    </div>

    <div class="ds">
      <h3>O que faz</h3>
      <p>${skill.description}</p>
    </div>

    <div class="ds">
      <h3>Outcome</h3>
      <div class="outcome-box"><p>${skill.outcome}</p></div>
    </div>

    ${triggersHTML ? `<div class="ds"><h3>Gatilhos</h3><div class="triggers-list">${triggersHTML}</div></div>` : ''}

    ${relHTML ? `<div class="ds"><h3>Relações</h3><div class="relations-list">${relHTML}</div></div>` : ''}

    <div class="ds">
      <h3>Texto original</h3>
      <div class="fulltext-box">${skill.fullText}</div>
    </div>
  `;

  content.querySelector('.detail-cmd').addEventListener('click', e => copyText(skill.command, e.currentTarget));
  content.querySelectorAll('.rel-item').forEach(el => {
    el.addEventListener('click', () => {
      const s = SKILLS.find(x => x.id === el.dataset.id);
      if (s) selectSkill(s);
    });
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// COPY
// ─────────────────────────────────────────────────────────────────────────────
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    showToast('Copiado!');
    if (btn) { btn.classList.add('copied'); setTimeout(() => btn.classList.remove('copied'), 1400); }
  });
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ─────────────────────────────────────────────────────────────────────────────
// FORCE-DIRECTED GRAPH
// ─────────────────────────────────────────────────────────────────────────────
class ForceGraph {
  constructor(canvas, skills, onSelect) {
    this.canvas   = canvas;
    this.ctx      = canvas.getContext('2d');
    this.skills   = skills;
    this.onSelect = onSelect;
    this.running  = true;
    this.alpha    = 1;
    this.dragging = null;
    this.hovered  = null;
    this.selected = null;
    this.mouseDownPos = null;

    this._resize();
    this._init();
    this._preloadIcons();
    this._bindEvents();
    this._tick();
  }

  _resize() {
    const c = this.canvas, p = c.parentElement;
    c.width  = p.clientWidth;
    c.height = p.clientHeight;
  }

  _init() {
    const W = this.canvas.width, H = this.canvas.height;
    const cx = W / 2, cy = H / 2;

    this.nodes = this.skills.map((skill, i) => {
      const angle = (i / this.skills.length) * Math.PI * 2;
      const r = 140 + (i % 3) * 50;
      return {
        skill,
        x: cx + Math.cos(angle) * r + (Math.random() - 0.5) * 40,
        y: cy + Math.sin(angle) * r + (Math.random() - 0.5) * 40,
        vx: 0, vy: 0,
        r: skill.type === 'orquestrador' ? 26 : 20,
      };
    });

    // Build edges (deduplicate — store one edge per unique pair)
    const edgeSet = new Set();
    this.edges = [];
    this.skills.forEach(skill => {
      skill.relations.forEach(rel => {
        const from = this.nodes.find(n => n.skill.id === skill.id);
        const to   = this.nodes.find(n => n.skill.id === rel.id);
        if (!from || !to) return;
        const key = [skill.id, rel.id].sort().join('|');
        if (edgeSet.has(key)) return;
        edgeSet.add(key);
        this.edges.push({ from, to, label: rel.rel });
      });
    });
  }

  _preloadIcons() {
    this.iconImages = {};
    this.skills.forEach(s => {
      const col = CAT_COLORS[s.category] || '#888888';
      this.iconImages[s.id] = makeIconImage(s.icon, col, 48);
    });
  }

  _update() {
    if (this.alpha < 0.002) return;
    const W = this.canvas.width, H = this.canvas.height;
    const cx = W / 2, cy = H / 2;

    const REPULSION   = 4000;
    const SPRING_K    = 0.06;
    const REST_LEN    = 160;
    const GRAVITY     = 0.015;
    const DAMPING     = 0.82;

    this.nodes.forEach(n => {
      if (n === this.dragging) return;
      let fx = 0, fy = 0;

      // Coulomb repulsion
      this.nodes.forEach(other => {
        if (other === n) return;
        const dx = n.x - other.x, dy = n.y - other.y;
        const d  = Math.max(Math.hypot(dx, dy), 25);
        const f  = REPULSION / (d * d);
        fx += (dx / d) * f;
        fy += (dy / d) * f;
      });

      // Hooke spring along edges
      this.edges.forEach(e => {
        let other = null;
        if (e.from === n) other = e.to;
        if (e.to   === n) other = e.from;
        if (!other) return;
        const dx = other.x - n.x, dy = other.y - n.y;
        const d  = Math.max(Math.hypot(dx, dy), 1);
        const f  = SPRING_K * (d - REST_LEN);
        fx += (dx / d) * f;
        fy += (dy / d) * f;
      });

      // Center gravity
      fx += (cx - n.x) * GRAVITY;
      fy += (cy - n.y) * GRAVITY;

      n.vx = (n.vx + fx) * DAMPING;
      n.vy = (n.vy + fy) * DAMPING;
      n.x  = Math.max(n.r + 20, Math.min(W - n.r - 20, n.x + n.vx));
      n.y  = Math.max(n.r + 24, Math.min(H - n.r - 24, n.y + n.vy));
    });

    this.alpha *= 0.992;
  }

  _draw() {
    const ctx = this.ctx;
    const W = this.canvas.width, H = this.canvas.height;
    ctx.clearRect(0, 0, W, H);

    const isConnected = (n) => this.hovered &&
      this.edges.some(e => (e.from === this.hovered || e.to === this.hovered) && (e.from === n || e.to === n));

    // Edges
    this.edges.forEach(e => {
      const highlighted = this.hovered && (e.from === this.hovered || e.to === this.hovered);
      ctx.beginPath();
      ctx.moveTo(e.from.x, e.from.y);
      ctx.lineTo(e.to.x, e.to.y);
      ctx.strokeStyle = highlighted ? 'rgba(91,77,232,0.65)' : 'rgba(0,0,0,0.1)';
      ctx.lineWidth   = highlighted ? 1.8 : 1;
      ctx.stroke();

      if (highlighted) {
        // Midpoint arrow
        const mx = (e.from.x + e.to.x) / 2;
        const my = (e.from.y + e.to.y) / 2;
        const angle = Math.atan2(e.to.y - e.from.y, e.to.x - e.from.x);
        ctx.beginPath();
        ctx.moveTo(mx + 8 * Math.cos(angle), my + 8 * Math.sin(angle));
        ctx.lineTo(mx + 8 * Math.cos(angle) - 10 * Math.cos(angle - 0.45), my + 8 * Math.sin(angle) - 10 * Math.sin(angle - 0.45));
        ctx.lineTo(mx + 8 * Math.cos(angle) - 10 * Math.cos(angle + 0.45), my + 8 * Math.sin(angle) - 10 * Math.sin(angle + 0.45));
        ctx.closePath();
        ctx.fillStyle = 'rgba(91,77,232,0.65)';
        ctx.fill();
      }
    });

    // Nodes
    this.nodes.forEach(n => {
      const col       = CAT_COLORS[n.skill.category] || '#888';
      const isSelected= n === this.selected;
      const isHovered = n === this.hovered;
      const connected = isConnected(n);
      const dimmed    = this.hovered && !isHovered && !connected;

      ctx.globalAlpha = dimmed ? 0.3 : 1;

      // Glow
      if (isSelected || isHovered) {
        const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 3.2);
        g.addColorStop(0, col + '50');
        g.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * 3.2, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
      }

      // Circle
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = isSelected ? col + '18' : '#ffffff';
      ctx.fill();
      ctx.strokeStyle = col;
      ctx.lineWidth   = isSelected ? 2.5 : isHovered ? 2 : 1.5;
      ctx.stroke();

      // Icon
      const img = this.iconImages[n.skill.id];
      if (img && img.complete && img.naturalWidth > 0) {
        const iconSize = Math.round(n.r * 1.1);
        ctx.drawImage(img, n.x - iconSize / 2, n.y - iconSize / 2, iconSize, iconSize);
      }

      // Label
      ctx.font          = `${isHovered || isSelected ? '600 ' : ''}11px -apple-system, sans-serif`;
      ctx.fillStyle     = isHovered || isSelected ? '#18182a' : '#9090a8';
      ctx.textBaseline  = 'top';
      ctx.fillText(n.skill.name, n.x, n.y + n.r + 5);

      ctx.globalAlpha = 1;
    });

    // Legend
    const cats = [...new Set(this.skills.map(s => s.category))];
    const catLabels = { pd:'Product Design', figma:'Figma', dev:'Interface', sistema:'Sistema', memoria:'Memória' };
    let lx = 14, ly = H - 14 - cats.length * 18;
    cats.forEach(cat => {
      ctx.beginPath();
      ctx.arc(lx + 5, ly + 5, 5, 0, Math.PI * 2);
      ctx.fillStyle = CAT_COLORS[cat] || '#888';
      ctx.fill();
      ctx.font      = '11px -apple-system, sans-serif';
      ctx.fillStyle = '#62627a';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(catLabels[cat] || cat, lx + 14, ly + 5);
      ly += 18;
    });

    // Hint
    ctx.font      = '11px -apple-system, sans-serif';
    ctx.fillStyle = '#aaaabf';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText('Arraste os nós · Clique para detalhar', W - 14, H - 10);
  }

  _tick() {
    if (!this.running) return;
    this._update();
    this._draw();
    requestAnimationFrame(() => this._tick());
  }

  _bindEvents() {
    const c = this.canvas;
    c.addEventListener('mousedown', e => {
      const p = this._pos(e);
      this.mouseDownPos = p;
      const hit = this._hit(p);
      if (hit) { this.dragging = hit; hit.vx = 0; hit.vy = 0; this.alpha = Math.max(this.alpha, 0.4); }
    });
    c.addEventListener('mousemove', e => {
      const p = this._pos(e);
      this.hovered = this._hit(p);
      c.style.cursor = this.hovered ? 'pointer' : 'default';
      if (this.dragging) {
        this.dragging.x = p.x; this.dragging.y = p.y;
        this.dragging.vx = 0;  this.dragging.vy = 0;
      }
    });
    c.addEventListener('mouseup', e => {
      const p = this._pos(e);
      const moved = this.mouseDownPos && Math.hypot(p.x - this.mouseDownPos.x, p.y - this.mouseDownPos.y) > 5;
      if (!moved && this.dragging) {
        this.selected = this.dragging;
        this.onSelect(this.dragging.skill);
      }
      this.dragging = null; this.mouseDownPos = null;
    });
    c.addEventListener('mouseleave', () => { this.dragging = null; this.hovered = null; c.style.cursor = 'default'; });
  }

  _pos(e) {
    const r = this.canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  _hit(p) { return this.nodes.find(n => Math.hypot(p.x - n.x, p.y - n.y) < n.r + 5) || null; }

  selectBySkillId(id) {
    const n = this.nodes.find(n => n.skill.id === id);
    if (n) this.selected = n;
  }

  destroy() { this.running = false; }
}

// ─────────────────────────────────────────────────────────────────────────────
// VIEW SWITCHING
// ─────────────────────────────────────────────────────────────────────────────
function showList() {
  document.getElementById('cards-area').style.display = 'flex';
  document.getElementById('graph-area').classList.remove('active');
  if (graphInstance) { graphInstance.destroy(); graphInstance = null; }
}

function showGraph() {
  document.getElementById('cards-area').style.display = 'none';
  const ga = document.getElementById('graph-area');
  ga.classList.add('active');

  setTimeout(() => {
    const canvas = document.getElementById('graph-canvas');
    graphInstance = new ForceGraph(canvas, SKILLS, skill => {
      selectSkill(skill);
      // sync card highlight in list
      document.querySelectorAll('.card').forEach(c => c.classList.toggle('active', c.dataset.id === skill.id));
    });
  }, 50);
}

// ─────────────────────────────────────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  if (currentView === 'list') renderCards();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    if (currentView === 'list') renderCards();
  });
});

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    if (currentView === 'list') showList();
    else showGraph();
  });
});

// Handle resize for graph canvas
window.addEventListener('resize', () => {
  if (graphInstance) graphInstance._resize();
});

// ── RESIZABLE PANEL ──────────────────────────────────────────────────────────
(function () {
  const handle = document.getElementById('resize-handle');
  const panel  = document.getElementById('detail-panel');
  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX   = e.clientX;
    startW   = panel.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor     = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = startX - e.clientX;
    const newW  = Math.min(Math.max(startW + delta, 220), window.innerWidth * 0.6);
    panel.style.width = newW + 'px';
    if (graphInstance) graphInstance._resize();
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
  });
})();

// ─────────────────────────────────────────────────────────────────────────────
// COMMAND PALETTE
// ─────────────────────────────────────────────────────────────────────────────
(function () {
  const overlay  = document.getElementById('palette-overlay');
  const input    = document.getElementById('palette-input');
  const results  = document.getElementById('palette-results');
  let selectedIdx = 0;
  let matches     = [];

  function open() {
    overlay.classList.add('open');
    input.value = '';
    input.focus();
    renderResults('');
  }

  function close() {
    overlay.classList.remove('open');
    input.blur();
  }

  function score(skill, q) {
    if (!q) return 1;
    const lq   = q.toLowerCase();
    const name = skill.name.toLowerCase();
    const cmd  = skill.command.toLowerCase();
    const desc = skill.description.toLowerCase();
    const trigs = skill.triggers.join(' ').toLowerCase();
    if (cmd.includes(lq))  return 100;
    if (name.startsWith(lq)) return 90;
    if (name.includes(lq))   return 70;
    if (desc.includes(lq))   return 40;
    if (trigs.includes(lq))  return 30;
    // character-order fuzzy on name
    let i = 0;
    for (const c of name) { if (c === lq[i]) i++; if (i === lq.length) return 15; }
    return 0;
  }

  function highlight(text, q) {
    if (!q) return text;
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if (idx === -1) return text;
    return text.slice(0, idx)
      + `<mark>${text.slice(idx, idx + q.length)}</mark>`
      + text.slice(idx + q.length);
  }

  function catColor(cat) { return CAT_COLORS[cat] || '#888'; }
  const catBg = { pd: 'var(--green-soft)', figma: 'var(--blue-soft)', dev: 'var(--pink-soft)', sistema: 'var(--orange-soft)', memoria: 'var(--yellow-soft)' };

  function renderResults(q) {
    matches = SKILLS
      .map(s => ({ skill: s, sc: score(s, q) }))
      .filter(x => x.sc > 0)
      .sort((a, b) => b.sc - a.sc)
      .map(x => x.skill);

    if (!matches.length) {
      results.innerHTML = `<div class="palette-empty">Nenhuma skill encontrada para "<strong>${q}</strong>"</div>`;
      return;
    }

    selectedIdx = 0;
    results.innerHTML = matches.map((s, i) => `
      <div class="palette-item${i === 0 ? ' selected' : ''}" data-idx="${i}">
        <div class="palette-item-icon" style="background:${catBg[s.category]};color:${catColor(s.category)}">${getIcon(s.icon, 16)}</div>
        <div class="palette-item-body">
          <div class="palette-item-name">${highlight(s.name, q)}</div>
          <div class="palette-item-desc">${s.description.slice(0, 72)}…</div>
        </div>
        <div class="palette-item-cmd">${s.command}</div>
      </div>
    `).join('');

    results.querySelectorAll('.palette-item').forEach(el => {
      el.addEventListener('mouseenter', () => setSelected(+el.dataset.idx));
      el.addEventListener('click', () => confirm(matches[+el.dataset.idx]));
    });
  }

  function setSelected(idx) {
    selectedIdx = Math.max(0, Math.min(idx, matches.length - 1));
    results.querySelectorAll('.palette-item').forEach((el, i) =>
      el.classList.toggle('selected', i === selectedIdx)
    );
    results.querySelector('.selected')?.scrollIntoView({ block: 'nearest' });
  }

  function confirm(skill) {
    copyText(skill.command, null);
    showToast(`Copiado: ${skill.command}`);
    close();
    selectSkill(skill);
  }

  input.addEventListener('input', () => renderResults(input.value.trim()));

  input.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setSelected(selectedIdx + 1); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setSelected(selectedIdx - 1); }
    if (e.key === 'Enter' && matches[selectedIdx]) confirm(matches[selectedIdx]);
    if (e.key === 'Escape') close();
  });

  overlay.addEventListener('mousedown', e => { if (e.target === overlay) close(); });

  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      overlay.classList.contains('open') ? close() : open();
    }
    if (e.key === 'Escape' && overlay.classList.contains('open')) close();
  });
})();

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
renderCards();
</script>
</body>
</html>
