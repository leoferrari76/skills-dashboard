<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Dashboard — Leonardo Ferrari</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="toast" id="toast">Copiado!</div>

<!-- COMMAND PALETTE -->
<div class="palette-overlay" id="palette-overlay">
  <div class="palette" id="palette">
    <div class="palette-input-row">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="palette-input" placeholder="Buscar skill ou descrever o que precisa…" autocomplete="off" spellcheck="false" />
      <span class="palette-kbd">Esc</span>
    </div>
    <div class="palette-results" id="palette-results"></div>
    <div class="palette-footer">
      <span class="palette-hint"><kbd>↑↓</kbd> navegar</span>
      <span class="palette-hint"><kbd>Enter</kbd> copiar comando</span>
      <span class="palette-hint"><kbd>⌘K</kbd> fechar</span>
    </div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
    <div class="logo-text">
      <h1>Skills Dashboard</h1>
      <p>Leonardo Ferrari · Claude Code</p>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Skills</div>
    </div>
    <div class="stat">
      <div class="stat-num">5</div>
      <div class="stat-label">Categorias</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-visible">0</div>
      <div class="stat-label">Visíveis</div>
    </div>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar skills, triggers…" autocomplete="off" />
  </div>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Todas</button>
    <button class="filter-btn" data-filter="pd">Product Design</button>
    <button class="filter-btn" data-filter="figma">Figma</button>
    <button class="filter-btn" data-filter="dev">Interface</button>
    <button class="filter-btn" data-filter="sistema">Sistema</button>
    <button class="filter-btn" data-filter="memoria">Memória</button>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" data-view="list" title="Lista">
      <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="2" rx="1"/><rect x="3" y="11" width="18" height="2" rx="1"/><rect x="3" y="17" width="18" height="2" rx="1"/></svg>
    </button>
    <button class="view-btn" data-view="graph" title="Grafo de relações">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="19" cy="19" r="2"/><path d="M7 12h5M14 6.5l-5 4M14 17.5l-5-4"/></svg>
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CARDS LIST -->
  <div class="cards-area" id="cards-area">
    <div class="no-results" id="no-results">
      <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>Nenhuma skill encontrada.</p>
    </div>
  </div>

  <!-- GRAPH -->
  <div class="graph-area" id="graph-area">
    <canvas id="graph-canvas"></canvas>
  </div>

  <!-- RESIZE HANDLE -->
  <div class="resize-handle" id="resize-handle"></div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-empty" id="detail-empty">
      <svg width="44" height="44" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
      <p>Selecione uma skill<br>para ver os detalhes</p>
    </div>
    <div class="detail-content" id="detail-content" style="display:none;"></div>
  </div>
</div>

<!-- DATA: one file per category — add skills here, not in app.js -->
<script src="icons.js"></script>
<script src="data/pd.js"></script>
<script src="data/figma.js"></script>
<script src="data/dev.js"></script>
<script src="data/sistema.js"></script>
<script src="data/memoria.js"></script>
<!-- APP LOGIC -->
<script src="app.js"></script>

</body>
</html>
